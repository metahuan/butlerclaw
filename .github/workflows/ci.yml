name: CI

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Lint with flake8
      run: |
        pip install flake8
        # Check for syntax errors only (don't fail build)
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true
        # Full lint check (report only, don't fail)
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics || true

    - name: Type check with mypy
      run: |
        pip install mypy
        mypy . --ignore-missing-imports || true

    - name: Test with pytest
      run: |
        pytest tests/ -v --cov=. --cov-report=xml --cov-report=term

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  build:
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows
            ext: .exe
          - os: macos-latest
            target: macos
            ext: ''
          - os: ubuntu-latest
            target: linux
            ext: ''

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-build.txt

    - name: Build executable (Windows)
      if: matrix.target == 'windows'
      run: |
        python -m PyInstaller OpenClaw安装助手.spec --clean

    - name: Build executable (macOS)
      if: matrix.target == 'macos'
      run: |
        chmod +x build_macos.sh
        ./build_macos.sh

    - name: Build executable (Linux)
      if: matrix.target == 'linux'
      run: |
        chmod +x build_linux.sh
        ./build_linux.sh

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: butlerclaw-${{ matrix.target }}
        path: |
          dist/*
        retention-days: 7
